name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional tag to publish under (skipped if blank)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-game:
    name: Build game (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            runner: ubuntu-latest
            preset: 'Windows Desktop'
            godot_output: clowns-and-mimes-windows.exe
            artifact: clowns-and-mimes-windows.exe
          - os: macos
            runner: macos-latest
            preset: 'macOS'
            # Godot writes a .zip; the codesign step below repackages it into
            # a signed and notarized .dmg under the artifact name.
            godot_output: clowns-and-mimes-macos.zip
            artifact: clowns-and-mimes-macos.dmg
          - os: linux
            runner: ubuntu-latest
            preset: 'Linux/X11'
            godot_output: clowns-and-mimes-linux.x86_64
            artifact: clowns-and-mimes-linux.x86_64
    steps:
      - uses: actions/checkout@v4
      - name: Install Godot 4 (Linux runners)
        if: matrix.runner == 'ubuntu-latest'
        run: |
          set -eu
          curl -L -o godot.zip https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          unzip -q godot.zip
          sudo mv Godot_v4.3-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          curl -L -o templates.tpz https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          unzip -q templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/4.3.stable/
      - name: Install Godot 4 (macOS runner)
        if: matrix.runner == 'macos-latest'
        run: |
          set -eu
          curl -L -o godot.zip https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_macos.universal.zip
          unzip -q godot.zip
          sudo mv Godot.app /Applications/Godot.app
          curl -L -o templates.tpz https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          mkdir -p ~/Library/Application\ Support/Godot/export_templates/4.3.stable
          unzip -q templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/Library/Application\ Support/Godot/export_templates/4.3.stable/
      - name: Prime project (import resources)
        shell: bash
        run: |
          if [ "${{ matrix.runner }}" = "macos-latest" ]; then
            /Applications/Godot.app/Contents/MacOS/Godot --headless --path game --import || true
          else
            godot --headless --path game --import || true
          fi
      - name: Export
        shell: bash
        run: |
          set -eu
          mkdir -p out
          if [ "${{ matrix.runner }}" = "macos-latest" ]; then
            /Applications/Godot.app/Contents/MacOS/Godot --headless --path game --export-release "${{ matrix.preset }}" "../out/${{ matrix.godot_output }}"
          else
            godot --headless --path game --export-release "${{ matrix.preset }}" "../out/${{ matrix.godot_output }}"
          fi
          test -e "out/${{ matrix.godot_output }}"
      - name: Sign, notarize, and package macOS .dmg
        if: matrix.runner == 'macos-latest'
        env:
          APPLE_DEVELOPER_ID_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          APPLE_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARIZATION_APPLE_ID: ${{ secrets.APPLE_NOTARIZATION_APPLE_ID }}
          APPLE_NOTARIZATION_APP_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_APP_PASSWORD }}
          GODOT_OUTPUT: ${{ matrix.godot_output }}
          ARTIFACT: ${{ matrix.artifact }}
        run: |
          set -euo pipefail

          # 1. Stand up an isolated keychain so the .p12 doesn't pollute the
          # runner's login keychain (cleaned up automatically when the runner
          # is reaped, but isolating keeps codesign from seeing unrelated
          # certs).
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          P12_PATH="$RUNNER_TEMP/cert.p12"
          printf '%s' "$APPLE_DEVELOPER_ID_P12_BASE64" | base64 -d > "$P12_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$P12_PATH" -k "$KEYCHAIN_PATH" \
            -P "$APPLE_DEVELOPER_ID_P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"' | xargs)
          # Allow codesign to use the imported key without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null

          # 2. Unzip Godot's output and locate the .app bundle.
          WORK_DIR="$RUNNER_TEMP/macos-build"
          mkdir -p "$WORK_DIR"
          unzip -q "out/$GODOT_OUTPUT" -d "$WORK_DIR"
          APP_PATH="$(find "$WORK_DIR" -maxdepth 2 -name '*.app' -print -quit)"
          test -d "$APP_PATH" || { echo "no .app bundle found in $WORK_DIR"; exit 1; }

          # 3. Sign inside-out. Apple has deprecated `codesign --deep` for
          # distribution: it doesn't guarantee that nested binaries are
          # signed before the bundle is wrapped, and the notary service
          # increasingly rejects bundles that were deep-signed. Walk every
          # Mach-O inside the .app first, sign each with the hardened
          # runtime, then sign the outer bundle once at the end.
          #
          # Entitlements include allow-jit because Godot's GDScript JIT
          # and some renderer paths refuse to run on hardened-runtime
          # builds without it.
          ENTITLEMENTS="$RUNNER_TEMP/entitlements.plist"
          cat > "$ENTITLEMENTS" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.cs.allow-jit</key>
              <true/>
              <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
              <true/>
              <key>com.apple.security.cs.disable-library-validation</key>
              <true/>
          </dict>
          </plist>
          PLIST
          SIGN_IDENTITY="Developer ID Application: Sean Reid ($APPLE_TEAM_ID)"
          # Sign every nested Mach-O (dylibs, frameworks, helper binaries)
          # before signing the outer .app. find prints deepest paths last
          # via -depth, which is the order codesign wants.
          # shellcheck disable=SC2046
          while IFS= read -r -d '' inner; do
            # Skip files that are not actually Mach-O. file(1) prints
            # "Mach-O" for binaries and dylibs in any architecture.
            if file -b "$inner" | grep -q "Mach-O"; then
              /usr/bin/codesign --force --options runtime --timestamp \
                --entitlements "$ENTITLEMENTS" \
                --sign "$SIGN_IDENTITY" \
                --keychain "$KEYCHAIN_PATH" \
                "$inner"
            fi
          done < <(find "$APP_PATH" -depth -type f -print0)
          # Outer bundle last. No --deep here.
          /usr/bin/codesign --force --options runtime --timestamp \
            --entitlements "$ENTITLEMENTS" \
            --sign "$SIGN_IDENTITY" \
            --keychain "$KEYCHAIN_PATH" \
            "$APP_PATH"
          /usr/bin/codesign --verify --deep --strict --verbose=2 "$APP_PATH"

          # 4. Wrap the signed .app in a .dmg with an /Applications symlink so
          # the user's first interaction is the standard drag-to-install.
          DMG_STAGING="$RUNNER_TEMP/dmg-staging"
          mkdir -p "$DMG_STAGING"
          cp -R "$APP_PATH" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"
          DMG_PATH="out/$ARTIFACT"
          hdiutil create -volname "Clowns and Mimes" \
            -srcfolder "$DMG_STAGING" -ov -format UDZO \
            "$DMG_PATH"
          /usr/bin/codesign --force --timestamp \
            --sign "Developer ID Application: Sean Reid ($APPLE_TEAM_ID)" \
            --keychain "$KEYCHAIN_PATH" \
            "$DMG_PATH"

          # 5. Notarize and staple the .dmg. Capture the submission as JSON
          # so we can pull Apple's verdict via `notarytool log` whenever the
          # call fails. --wait blocks until Apple finishes scanning. We
          # intentionally do NOT pass --timeout because the v0.2.0 ship
          # observed a healthy 3.5-hour wait that would have been killed by
          # an explicit short cap. The GitHub job's 6-hour default is the
          # outer bound; if Apple is still polling past that, manual
          # intervention is the right answer rather than another retry.
          SUBMIT_OUT="$RUNNER_TEMP/notarize-submit.json"
          if ! xcrun notarytool submit "$DMG_PATH" \
              --apple-id "$APPLE_NOTARIZATION_APPLE_ID" \
              --password "$APPLE_NOTARIZATION_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait \
              --output-format json \
              > "$SUBMIT_OUT"; then
            echo "notarytool submit failed; dumping result and log"
            cat "$SUBMIT_OUT" || true
            SUB_ID="$(python3 -c "import json,sys; print(json.load(open(sys.argv[1])).get('id',''))" "$SUBMIT_OUT" 2>/dev/null || true)"
            if [ -n "$SUB_ID" ]; then
              xcrun notarytool log "$SUB_ID" \
                --apple-id "$APPLE_NOTARIZATION_APPLE_ID" \
                --password "$APPLE_NOTARIZATION_APP_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" || true
            fi
            exit 1
          fi
          # Even on success the JSON may report status=Invalid; fetch the
          # log unconditionally and bail if Apple didn't accept the bundle.
          STATUS="$(python3 -c "import json,sys; print(json.load(open(sys.argv[1])).get('status',''))" "$SUBMIT_OUT")"
          if [ "$STATUS" != "Accepted" ]; then
            SUB_ID="$(python3 -c "import json,sys; print(json.load(open(sys.argv[1])).get('id',''))" "$SUBMIT_OUT")"
            echo "notarytool returned status=$STATUS; fetching log"
            xcrun notarytool log "$SUB_ID" \
              --apple-id "$APPLE_NOTARIZATION_APPLE_ID" \
              --password "$APPLE_NOTARIZATION_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" || true
            exit 1
          fi
          xcrun stapler staple "$DMG_PATH"

          # 6. The Godot .zip is intermediate; only the .dmg ships.
          rm -f "out/$GODOT_OUTPUT"
          test -e "$DMG_PATH"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: out/${{ matrix.artifact }}
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-game
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          set -eu
          tag="${GITHUB_REF_NAME#v}"
          notes="$(awk -v ver="$tag" '
            /^## \[/ {
              if (capture) { exit }
              if ($0 ~ ("\\[" ver "\\]")) { capture=1; next }
            }
            capture { print }
          ' CHANGELOG.md)"
          if [ -z "$(printf "%s" "$notes" | tr -d "[:space:]")" ]; then
            echo "No CHANGELOG entry for $tag; falling back to auto-generated notes."
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$notes" > /tmp/release-notes.md
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish release with CHANGELOG body
        if: steps.notes.outputs.has_notes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          body_path: /tmp/release-notes.md
      - name: Publish release with auto-generated notes
        if: steps.notes.outputs.has_notes != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true

  deploy-backend:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-game
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Check Cloudflare credentials
        id: creds
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Skipping deploy - CLOUDFLARE_API_TOKEN secret is not set yet."
          fi
      - if: steps.creds.outputs.configured == 'true'
        run: pnpm install --frozen-lockfile
      - if: steps.creds.outputs.configured == 'true'
        name: Deploy matchmaker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter @cm/matchmaker deploy:production
      - if: steps.creds.outputs.configured == 'true'
        name: Deploy room
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter @cm/room deploy:production

  # Website deploys live in .github/workflows/deploy-website.yml, which fires on
  # every push to main. Tag pushes hit main first, so by the time the release
  # workflow runs the site is already current. Re-running the pages deploy here
  # races the dedicated workflow's artifact and surfaces BlobNotFound 404s.
