name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional tag to publish under (skipped if blank)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-game:
    name: Build game (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            runner: ubuntu-latest
            preset: 'Windows Desktop'
            output: clowns-and-mimes-windows.exe
          - os: macos
            runner: macos-latest
            preset: 'macOS'
            output: clowns-and-mimes-macos.zip
          - os: linux
            runner: ubuntu-latest
            preset: 'Linux/X11'
            output: clowns-and-mimes-linux.x86_64
    steps:
      - uses: actions/checkout@v4
      - name: Install Godot 4 (Linux runners)
        if: matrix.runner == 'ubuntu-latest'
        run: |
          set -eu
          curl -L -o godot.zip https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          unzip -q godot.zip
          sudo mv Godot_v4.3-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          curl -L -o templates.tpz https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          unzip -q templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/4.3.stable/
      - name: Install Godot 4 (macOS runner)
        if: matrix.runner == 'macos-latest'
        run: |
          set -eu
          curl -L -o godot.zip https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_macos.universal.zip
          unzip -q godot.zip
          sudo mv Godot.app /Applications/Godot.app
          curl -L -o templates.tpz https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          mkdir -p ~/Library/Application\ Support/Godot/export_templates/4.3.stable
          unzip -q templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/Library/Application\ Support/Godot/export_templates/4.3.stable/
      - name: Prime project (import resources)
        shell: bash
        run: |
          if [ "${{ matrix.runner }}" = "macos-latest" ]; then
            /Applications/Godot.app/Contents/MacOS/Godot --headless --path game --import || true
          else
            godot --headless --path game --import || true
          fi
      - name: Export
        shell: bash
        run: |
          set -eu
          mkdir -p out
          if [ "${{ matrix.runner }}" = "macos-latest" ]; then
            /Applications/Godot.app/Contents/MacOS/Godot --headless --path game --export-release "${{ matrix.preset }}" "../out/${{ matrix.output }}"
          else
            godot --headless --path game --export-release "${{ matrix.preset }}" "../out/${{ matrix.output }}"
          fi
          test -e "out/${{ matrix.output }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: out/${{ matrix.output }}
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-game
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          set -eu
          tag="${GITHUB_REF_NAME#v}"
          notes="$(awk -v ver="$tag" '
            /^## \[/ {
              if (capture) { exit }
              if ($0 ~ ("\\[" ver "\\]")) { capture=1; next }
            }
            capture { print }
          ' CHANGELOG.md)"
          if [ -z "$(printf "%s" "$notes" | tr -d "[:space:]")" ]; then
            echo "No CHANGELOG entry for $tag; falling back to auto-generated notes."
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$notes" > /tmp/release-notes.md
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish release with CHANGELOG body
        if: steps.notes.outputs.has_notes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          body_path: /tmp/release-notes.md
      - name: Publish release with auto-generated notes
        if: steps.notes.outputs.has_notes != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true

  deploy-backend:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-game
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Check Cloudflare credentials
        id: creds
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Skipping deploy - CLOUDFLARE_API_TOKEN secret is not set yet."
          fi
      - if: steps.creds.outputs.configured == 'true'
        run: pnpm install --frozen-lockfile
      - if: steps.creds.outputs.configured == 'true'
        name: Deploy matchmaker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter @cm/matchmaker deploy:production
      - if: steps.creds.outputs.configured == 'true'
        name: Deploy room
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter @cm/room deploy:production

  deploy-website:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-game
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter website build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist
      - id: deployment
        uses: actions/deploy-pages@v4
